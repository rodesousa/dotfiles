# Créer de nouvelles fenêtres/onglets  
map ctrl+shift+o new_window_with_cwd
# map ctrl+shift+e new_tab_with_cwd

enabled_layouts tall,stack

map ctrl+shift+z next_layout

# Splits avec tmux (si installé)
# map ctrl+shift+h launch --type=window tmux split-window -h
# map ctrl+shift+v launch --type=window tmux split-window -v

# Navigation entre fenêtres
# map ctrl+shift+left next_window
map alt+down next_window

# map ctrl+shift+right previous_window
map alt+up previous_window

map ctrl+shift+up next_tab
map ctrl+shift+down previous_tab

# Fermer fenêtre/onglet
map ctrl+shift+w close_window
map ctrl+shift+q close_tab

# map ctrl+shift+n new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd

# Background settings
# background #002b36
# background_opacity 0.95
background #ffffff
foreground #1a1a1a
background_opacity 1.0
background_blur 20

# Terminal type
term xterm-256color

# Font configuration
font_family      monospace
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 11.0
